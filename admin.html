<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>Admin - TNSED Quiz Control</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; padding: 20px; color: #1a2639; }
        .box { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #e67e22; padding-bottom: 10px; color: #1a2639; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #1a2639; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        .btn { padding: 12px 24px; background: #e67e22; color: white; border: none; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 1rem; }
        .btn:hover { background: #d35400; }
        input { padding: 12px; width: 250px; border-radius: 6px; border: 1px solid #ccc; font-size: 1rem; margin-right: 10px; }
        #status-msg { font-weight: bold; color: #27ae60; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Control Panel</h2>
        <p>Set the active test code for all students:</p>
        <input type="text" id="newCode" placeholder="Enter Test Code (e.g. T101)">
        <button class="btn" onclick="setActiveTest()">Set Active Test</button>
        <p id="status-msg">Current Active Test: <span id="current-code-display" style="color:#e67e22">Loading...</span></p>
    </div>

    <div class="box">
        <h2>Student Results</h2>
        <button class="btn" style="background:#27ae60" onclick="loadResults()">Refresh Results List</button>
        <table>
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Mobile</th>
                    <th>Test Code</th>
                    <th>Questions Answered</th>
                    <th>Submission Time</th>
                </tr>
            </thead>
            <tbody id="results-table">
                <tr><td colspan="5" style="text-align:center;">Click Refresh to load data</td></tr>
            </tbody>
        </table>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 1. YOUR REAL CONFIG (Pre-filled from your previous code)
    const firebaseConfig = {
        apiKey: "AIzaSyCkeMB4EUzXVEzoGsO-gTiCsId50IdHfCA",
        authDomain: "tnclassroom-quiz-portal.firebaseapp.com",
        projectId: "tnclassroom-quiz-portal",
        storageBucket: "tnclassroom-quiz-portal.firebasestorage.app",
        messagingSenderId: "360434190743",
        appId: "1:360434190743:web:e67eee55d43140cc4f9cd2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Function to update the test code
    window.setActiveTest = async () => {
        const codeInput = document.getElementById('newCode').value.trim().toUpperCase();
        if(!codeInput) return alert("Please enter a code!");
        
        try {
            await setDoc(doc(db, "settings", "current_test"), { code: codeInput });
            alert("Success! Active test is now: " + codeInput);
            document.getElementById('current-code-display').innerText = codeInput;
        } catch (e) {
            alert("Error: " + e.message);
        }
    };

    // Function to load the current code from Firestore
    async function loadCurrentCode() {
        try {
            const snap = await getDoc(doc(db, "settings", "current_test"));
            if(snap.exists()) {
                document.getElementById('current-code-display').innerText = snap.data().code;
            } else {
                document.getElementById('current-code-display').innerText = "None Set";
            }
        } catch (e) {
            document.getElementById('current-code-display').innerText = "Error Loading";
        }
    }

    // Function to load results
    window.loadResults = async () => {
        const table = document.getElementById('results-table');
        table.innerHTML = "<tr><td colspan='5' style='text-align:center;'>Loading...</td></tr>";
        
        try {
            const q = query(collection(db, "submissions"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            table.innerHTML = "";
            
            if (querySnapshot.empty) {
                table.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No submissions found.</td></tr>";
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const time = data.timestamp ? data.timestamp.toDate().toLocaleString() : "N/A";
                const count = data.answers ? Object.keys(data.answers).length : 0;
                
                const row = `<tr>
                    <td><b>${data.name}</b></td>
                    <td>${data.mobile}</td>
                    <td><span style="color:#e67e22; font-weight:bold;">${data.testCode}</span></td>
                    <td>${count} Questions</td>
                    <td>${time}</td>
                </tr>`;
                table.innerHTML += row;
            });
        } catch (e) {
            console.error(e);
            table.innerHTML = `<tr><td colspan='5' style='text-align:center; color:red;'>Error: ${e.message}</td></tr>`;
        }
    };

    // Run on startup
    loadCurrentCode();
    loadResults();
</script>
</body>
</html>
