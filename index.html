<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNSED Quiz Portal</title>
    <style>
        :root { --primary: #4A90E2; --success: #2ecc71; --error: #e74c3c; --bg: #f4f7f9; --card-bg: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; color: #2d3436; }
        #app { width: 95%; max-width: 500px; margin: 20px 0; }
        
        .card { background: var(--card-bg); padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); transition: all 0.3s ease; }
        .hidden { display: none; }
        
        h2 { margin-top: 0; font-size: 1.5rem; text-align: center; color: #2c3e50; }
        .progress-container { height: 8px; background: #dfe6e9; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); width: 0%; border-radius: 10px; transition: 0.5s ease; }

        /* Question & Options */
        .question-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; line-height: 1.4; }
        .option-label { display: block; padding: 16px; margin-bottom: 12px; border: 2px solid #f1f2f6; border-radius: 15px; cursor: pointer; transition: 0.2s; position: relative; background: #fbfcfe; }
        .option-label:hover { border-color: var(--primary); background: #f0f7ff; }
        input[type="radio"] { position: absolute; opacity: 0; }
        .selected { border-color: var(--primary) !important; background: #eef7ff !important; box-shadow: 0 4px 12px rgba(74, 144, 226, 0.1); }

        /* Buttons */
        .controls { display: flex; justify-content: space-between; margin-top: 30px; gap: 12px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn-next { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3); }
        .btn-back { background: #f1f2f6; color: #636e72; }
        .btn-submit { background: var(--success); color: white; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Spinner & Status */
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 30px; height: 30px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; display: inline-block; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-view { text-align: center; padding: 40px; }

        /* Result Key */
        .ans-row { padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 6px solid #dfe6e9; font-size: 0.95rem; }
        .correct-row { background: #f0fff4; border-color: var(--success); }
        .wrong-row { background: #fff5f5; border-color: var(--error); }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-login" class="card">
        <h2>Quiz Portal</h2>
        <p style="text-align:center; color:#636e72;">Please enter your ID to begin</p>
        <input type="text" id="studentId" placeholder="EMIS ID / Name" style="width:100%; box-sizing:border-box; padding:15px; border:2px solid #eee; border-radius:12px; margin-bottom:20px; font-size:1rem;">
        <button class="btn-next" onclick="startQuiz()">Get Questions</button>
    </div>

    <div id="screen-quiz" class="card hidden">
        <div class="progress-container"><div class="progress-bar" id="progress"></div></div>
        <div id="question-content"></div>
        <div class="controls">
            <button class="btn-back" id="prevBtn" onclick="move(-1)">Back</button>
            <button class="btn-next" id="nextBtn" onclick="move(1)">Next</button>
            <button class="btn-submit hidden" id="previewBtn" onclick="showPreview()">Final Review</button>
        </div>
    </div>

    <div id="screen-preview" class="card hidden">
        <h2>Review Answers</h2>
        <div id="preview-list" style="margin-bottom:20px;"></div>
        
        <div id="submit-actions">
            <div class="controls">
                <button class="btn-back" onclick="closePreview()">Edit</button>
                <button class="btn-submit" onclick="finalSubmit()">Finish & Submit</button>
            </div>
        </div>

        <div id="status-loading" class="hidden loading-view">
            <div class="spinner"></div>
            <p>Uploading scores to Google Sheets...</p>
        </div>
    </div>

    <div id="screen-results" class="card hidden">
        <h2 id="score-text"></h2>
        <div id="key-list"></div>
        <button class="btn-next" onclick="location.reload()" style="margin-top:20px; width:100%;">Take Another Test</button>
    </div>
</div>

<script>
    // 1. SET YOUR APPS SCRIPT URL HERE
    const API_URL = "https://script.google.com/macros/s/AKfycbyGR3gNKEEw87xNUCMCFmmqQ_7v2NdGbqVY2RQAjenrMQt3EZj5U0qw3Z0cGfuOaz5N/exec"; 
    
    let quizData = [], userAnswers = [], currentIdx = 0;

    async function startQuiz() {
        const id = document.getElementById('studentId').value;
        if(!id) return alert("Please enter your EMIS ID or Name");
        
        document.getElementById('screen-login').innerHTML = `<div class="loading-view"><div class="spinner"></div><p>Fetching your questions...</p></div>`;
        
        try {
            const res = await fetch(API_URL);
            quizData = await res.json();
            if(quizData.length === 0) throw new Error("No questions found for the active set.");
            
            userAnswers = new Array(quizData.length).fill(null);
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            renderQuestion();
        } catch(e) {
            alert("Connection Error: " + e.message);
            location.reload();
        }
    }

    function renderQuestion() {
        const q = quizData[currentIdx];
        let html = `<div class="question-title">Q${currentIdx+1}: ${q.question}</div><div class="options">`;
        q.options.forEach((opt, i) => {
            const isSel = userAnswers[currentIdx] === i ? 'selected' : '';
            html += `
                <label class="option-label ${isSel}">
                    <input type="radio" name="quizOpt" value="${i}" onclick="selectOpt(${i})" ${isSel?'checked':''}>
                    <span>${opt}</span>
                </label>`;
        });
        document.getElementById('question-content').innerHTML = html + `</div>`;
        updateNav();
    }

    function selectOpt(i) {
        userAnswers[currentIdx] = i;
        renderQuestion();
    }

    function move(step) {
        if(step === 1 && userAnswers[currentIdx] === null) return alert("Please select an answer first.");
        currentIdx += step;
        renderQuestion();
    }

    function updateNav() {
        document.getElementById('prevBtn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        const isLast = currentIdx === quizData.length - 1;
        document.getElementById('nextBtn').classList.toggle('hidden', isLast);
        document.getElementById('previewBtn').classList.toggle('hidden', !isLast);
        document.getElementById('progress').style.width = ((currentIdx + 1) / quizData.length * 100) + "%";
    }

    function showPreview() {
        if(userAnswers[currentIdx] === null) return alert("Please select an answer first.");
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('screen-preview').classList.remove('hidden');
        
        document.getElementById('preview-list').innerHTML = quizData.map((q, i) => `
            <div style="padding:10px; border-bottom:1px solid #eee;">
                <strong>Q${i+1}:</strong> ${userAnswers[i] !== null ? '<span style="color:green">Answered</span>' : '<span style="color:red">Missed</span>'}
            </div>
        `).join('');
    }

    function closePreview() {
        document.getElementById('screen-preview').classList.add('hidden');
        document.getElementById('screen-quiz').classList.remove('hidden');
    }
 function finalSubmit() {
    let score = 0;
    quizData.forEach((q, i) => { if(userAnswers[i] == q.correct) score++; });

    const studentName = document.getElementById('studentId').value;
    const totalQ = quizData.length;

    // REPLACE THESE WITH YOUR GOOGLE FORM DETAILS
    const formID = "YOUR_FORM_ID_HERE"; 
    const entryName = "entry.111111"; // Change to your Name entry ID
    const entryScore = "entry.222222"; // Change to your Score entry ID
    const entryTotal = "entry.333333"; // Change to your Total entry ID

    const finalUrl = `https://docs.google.com/forms/d/e/${formID}/formResponse?` + 
                    `${entryName}=${encodeURIComponent(studentName)}&` +
                    `${entryScore}=${score}&` +
                    `${entryTotal}=${totalQ}&submit=Submit`;

    // This "fires" the data to the form in the background
    const ifr = document.createElement('iframe');
    ifr.style.display = 'none';
    ifr.src = finalUrl;
    document.body.appendChild(ifr);

    // Show results immediately since we know the data is sent
    setTimeout(() => {
        document.getElementById('screen-preview').classList.add('hidden');
        document.getElementById('screen-results').classList.remove('hidden');
        document.getElementById('score-text').innerText = `Submitted Successfully! Score: ${score} / ${totalQ}`;
        
        // Show Answer Key
        document.getElementById('key-list').innerHTML = quizData.map((q, i) => `
            <div class="ans-row ${userAnswers[i] == q.correct ? 'correct-row' : 'wrong-row'}">
                <strong>Q${i+1}: ${q.question}</strong><br>
                Correct: ${q.options[q.correct]}
            </div>
        `).join('');
    }, 1000);
}
function showSuccess(score) {
    document.getElementById('screen-preview').classList.add('hidden');
    document.getElementById('screen-results').classList.remove('hidden');
    document.getElementById('score-text').innerText = `You Scored: ${score} / ${quizData.length}`;
    
    document.getElementById('key-list').innerHTML = quizData.map((q, i) => `
        <div class="ans-row ${userAnswers[i] == q.correct ? 'correct-row' : 'wrong-row'}">
            <strong>Q${i+1}: ${q.question}</strong><br>
            Your Answer: ${q.options[userAnswers[i]] || 'Skipped'}<br>
            Correct: ${q.options[q.correct]}
        </div>
    `).join('');
}
    
</script>
</body>
</html>
