<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNSED Quiz Portal</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #1a2639; --accent: #e67e22; --light-blue: #d1e1f0; }
        body { background-color: var(--primary); color: white; font-family: 'Arial', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        .card { background: transparent; padding: 10px; }
        h2 { text-align: center; color: var(--accent); }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; box-sizing: border-box; font-size: 1rem; color: #333; }
        .q-text { font-size: 1.2rem; margin: 20px 0; line-height: 1.6; }
        .option { background: var(--light-blue); color: #333; padding: 15px; border-radius: 30px; margin-bottom: 15px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .option.selected { background: var(--accent); color: white; }
        .opt-circle { background: var(--accent); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-right: 15px; font-weight: bold; }
        .btn { background: var(--accent); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-secondary { background: #7f8c8d; }
        #preview-section, #quiz-section { display: none; }

        /* Spinner Overlay */
#loading-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7);
    z-index: 9999;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.spinner {
    border: 4px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    border-top: 4px solid var(--accent);
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
    </style>
</head>
<body>
<div id="loading-overlay">
    <div class="spinner"></div>
    <p style="margin-top:10px;">சமர்ப்பிக்கப்படுகிறது... (Submitting...)</p>
</div>
<div class="container">
    <div id="login-section" class="card">
        <h2>TNSED Quiz</h2>
        <input type="text" id="userName" placeholder="பெயர் (Name)">
        <input type="tel" id="userMobile" placeholder="கைபேசி எண் (Mobile)">
        <button class="btn" onclick="startQuiz()">தொடங்குக</button>
    </div>

    <div id="quiz-section" class="card">
        <div style="display:flex; justify-content: space-between;">
            <span id="q-count">வினா</span>
            <span id="timer">03:00 min</span>
        </div>
        <div class="q-text" id="question-display">Loading questions...</div>
        <div id="options-display"></div>
        <button class="btn" onclick="showPreview()">சமர்ப்பிக்க (Submit)</button>
    </div>

    <div id="preview-section" class="card">
        <h2>சரிபார்க்கவும் (Preview)</h2>
        <div id="preview-content" style="background: #2c3e50; padding: 15px; border-radius: 10px; margin-bottom: 20px;"></div>
        <button class="btn" onclick="confirmAndSave()">உறுதிப்படுத்துக (Confirm)</button>
        <button class="btn btn-secondary" onclick="backToEdit()">திருத்துக (Edit)</button>
    </div>
</div>

<script type="module">
    // 1. ADDED MISSING IMPORTS (Firestore functions)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCkeMB4EUzXVEzoGsO-gTiCsId50IdHfCA",
        authDomain: "tnclassroom-quiz-portal.firebaseapp.com",
        projectId: "tnclassroom-quiz-portal",
        storageBucket: "tnclassroom-quiz-portal.firebasestorage.app",
        messagingSenderId: "360434190743",
        appId: "1:360434190743:web:e67eee55d43140cc4f9cd2",
        measurementId: "G-1ZS8JJC803"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let questions = [];
    let userAnswers = {};
    let userName = "";
    let userMobile = "";

    // FETCH DATA
    async function fetchQuestions() {
        try {
            const querySnapshot = await getDocs(collection(db, "questions"));
            questions = [];
            querySnapshot.forEach((doc) => {
                questions.push({ id: doc.id, ...doc.data() });
            });

            if (questions.length > 0) {
                renderQuestion(0);
            } else {
                document.getElementById('question-display').innerText = "No questions found.";
            }
        } catch (error) {
            console.error("Firestore Error:", error);
            alert("Error loading questions. Check your Firestore rules.");
        }
    }

    // RENDER LOGIC
    function renderQuestion(index) {
        if (!questions[index]) return;
        const q = questions[index];
        
        document.getElementById('q-count').innerText = `வினா ${index + 1}/${questions.length}`;
        document.getElementById('question-display').innerHTML = q.q;
        
        const optCont = document.getElementById('options-display');
        optCont.innerHTML = "";
        
        q.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = `option ${userAnswers[q.id] === i ? 'selected' : ''}`;
            div.innerHTML = `<div class="opt-circle">${String.fromCharCode(65+i)}</div> ${opt}`;
            div.onclick = () => {
                userAnswers[q.id] = i;
                renderQuestion(index);
            };
            optCont.appendChild(div);
        });
        
        if (window.MathJax) MathJax.typesetPromise();
    }

    // GLOBAL FUNCTIONS
    window.startQuiz = function() {
        userName = document.getElementById('userName').value;
        userMobile = document.getElementById('userMobile').value;
        if(!userName || !userMobile) return alert("விவரங்களை நிரப்பவும்");
        
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        fetchQuestions();
    };

    window.showPreview = function() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('preview-section').style.display = 'block';
        
        let html = `<p><b>பெயர்:</b> ${userName}</p><p><b>கைபேசி:</b> ${userMobile}</p><hr>`;
        questions.forEach((q, i) => {
            const optIndex = userAnswers[q.id];
            const ans = optIndex !== undefined ? q.options[optIndex] : "Not Answered";
            html += `<p>${i+1}. ${ans}</p>`;
        });
        document.getElementById('preview-content').innerHTML = html;
        if (window.MathJax) MathJax.typesetPromise();
    };
window.confirmAndSave = async function() {
    const overlay = document.getElementById('loading-overlay');
    const confirmBtn = event.target; // Gets the button that was clicked

    try {
        // 1. Show the spin wheel and disable the button
        overlay.style.display = 'flex';
        confirmBtn.disabled = true;
        confirmBtn.innerText = "Processing...";

        // 2. Save to Firestore
        await addDoc(collection(db, "submissions"), {
            name: userName,
            mobile: userMobile,
            answers: userAnswers,
            status: "pending",
            timestamp: new Date()
        });

        // 3. Success!
        alert("வெற்றிகரமாகச் சமர்ப்பிக்கப்பட்டது!");
        location.reload();

    } catch (e) {
        // 4. If it fails, hide the spinner so they can try again
        overlay.style.display = 'none';
        confirmBtn.disabled = false;
        confirmBtn.innerText = "உறுதிப்படுத்துக (Confirm)";
        
        console.error(e);
        alert("சமர்ப்பிக்க முடியவில்லை: " + e.message);
    }
};

    window.backToEdit = () => {
        document.getElementById('preview-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
    };
</script>
</body>
</html>
