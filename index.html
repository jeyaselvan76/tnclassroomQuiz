<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNSED Student Quiz Portal</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #1a2639; --accent: #e67e22; --light-blue: #d1e1f0; --success: #27ae60; }
        body { background-color: var(--primary); color: white; font-family: 'Arial', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        .card { background: transparent; padding: 10px; }
        h2 { text-align: center; color: var(--accent); }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; box-sizing: border-box; font-size: 1rem; color: #333; }
        .q-header { display: flex; justify-content: space-between; margin-bottom: 10px; color: var(--light-blue); font-weight: bold; }
        .q-text { font-size: 1.2rem; margin: 20px 0; line-height: 1.6; min-height: 100px; }
        .option { background: var(--light-blue); color: #333; padding: 15px; border-radius: 30px; margin-bottom: 15px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .option.selected { background: var(--accent); color: white; }
        .opt-circle { background: var(--accent); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-right: 15px; font-weight: bold; }
        .btn { background: var(--accent); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-secondary { background: #34495e; }
        .nav-group { display: flex; gap: 10px; margin-top: 20px; }
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #quiz-section, #preview-section { display: none; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text" style="margin-top:15px;">செயலாக்கிகிறது...</p>
</div>

<div class="container">
    <div id="login-section" class="card">
        <h2>TNSED Quiz</h2>
        <input type="text" id="userName" placeholder="பெயர் (Name)">
        <input type="tel" id="userMobile" placeholder="கைபேசி எண் (Mobile)">
        <button class="btn" onclick="startQuiz()">தொடங்குக (Start)</button>
    </div>

    <div id="quiz-section" class="card">
        <div class="q-header">
            <span id="q-count">வினா 0/0</span>
            <span id="display-test-code">--</span>
        </div>
        <div class="q-text" id="question-display">Loading...</div>
        <div id="options-display"></div>
        
        <div class="nav-group">
            <button class="btn btn-secondary" id="prev-btn" onclick="changeQuestion(-1)" style="display:none;">முந்தைய</button>
            <button class="btn" id="next-btn" onclick="changeQuestion(1)">அடுத்தது</button>
        </div>
        <button class="btn" id="final-submit-btn" onclick="showPreview()" style="display:none; background-color: var(--success);">சமர்ப்பிக்க (Submit)</button>
    </div>

    <div id="preview-section" class="card">
        <h2>சரிபார்க்கவும் (Review)</h2>
        <div id="preview-content" style="background: #2c3e50; padding: 15px; border-radius: 10px; margin-bottom: 20px;"></div>
        <button class="btn" id="confirm-btn" onclick="confirmAndSave()" style="background-color: var(--success);">உறுதிப்படுத்துக (Confirm)</button>
        <button class="btn btn-secondary" onclick="backToEdit()">திருத்துக (Edit)</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCkeMB4EUzXVEzoGsO-gTiCsId50IdHfCA",
        authDomain: "tnclassroom-quiz-portal.firebaseapp.com",
        projectId: "tnclassroom-quiz-portal",
        storageBucket: "tnclassroom-quiz-portal.firebasestorage.app",
        messagingSenderId: "360434190743",
        appId: "1:360434190743:web:e67eee55d43140cc4f9cd2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let questions = [];
    let userAnswers = {};
    let currentIndex = 0;
    let userName, userMobile, activeCode;

    const overlay = document.getElementById('loading-overlay');

    // GET ACTIVE TEST FROM ADMIN SETTINGS
    async function getActiveCode() {
        const docRef = doc(db, "settings", "current_test");
        const docSnap = await getDoc(docRef);
        return docSnap.exists() ? docSnap.data().code : null;
    }

    // START QUIZ
    window.startQuiz = async () => {
        userName = document.getElementById('userName').value.trim();
        userMobile = document.getElementById('userMobile').value.trim();
        
        if(!userName || !userMobile) return alert("விவரங்களை நிரப்பவும்");

        overlay.style.display = 'flex';
        activeCode = await getActiveCode();

        if(!activeCode) {
            overlay.style.display = 'none';
            return alert("No active test set by Admin.");
        }

        const qSet = query(collection(db, "questions"), where("testCode", "==", activeCode));
        const querySnapshot = await getDocs(qSet);
        
        questions = [];
        querySnapshot.forEach(doc => questions.push({ id: doc.id, ...doc.data() }));

        if(questions.length > 0) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';
            document.getElementById('display-test-code').innerText = activeCode;
            renderQuestion(0);
        } else {
            alert("No questions found for code: " + activeCode);
        }
        overlay.style.display = 'none';
    };

    // RENDER QUESTION WITH NAVIGATION LOGIC
    function renderQuestion(index) {
        currentIndex = index;
        const q = questions[index];
        
        document.getElementById('q-count').innerText = `வினா ${index + 1}/${questions.length}`;
        document.getElementById('question-display').innerHTML = q.q;
        
        const optCont = document.getElementById('options-display');
        optCont.innerHTML = "";
        
        q.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = `option ${userAnswers[q.id] === i ? 'selected' : ''}`;
            div.innerHTML = `<div class="opt-circle">${String.fromCharCode(65+i)}</div> ${opt}`;
            div.onclick = () => {
                userAnswers[q.id] = i;
                renderQuestion(index);
            };
            optCont.appendChild(div);
        });

        // Navigation properly set
        document.getElementById('prev-btn').style.display = index === 0 ? 'none' : 'block';
        if (index === questions.length - 1) {
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('final-submit-btn').style.display = 'block';
        } else {
            document.getElementById('next-btn').style.display = 'block';
            document.getElementById('final-submit-btn').style.display = 'none';
        }

        if (window.MathJax) MathJax.typesetPromise();
    }

    window.changeQuestion = (step) => {
        currentIndex += step;
        renderQuestion(currentIndex);
    };

    window.showPreview = () => {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('preview-section').style.display = 'block';
        
        let html = `<p><b>பெயர்:</b> ${userName}</p><p><b>தேர்வு:</b> ${activeCode}</p><hr>`;
        questions.forEach((q, i) => {
            const ans = userAnswers[q.id] !== undefined ? q.options[userAnswers[q.id]] : "No Answer";
            html += `<p>${i+1}. ${ans}</p>`;
        });
        document.getElementById('preview-content').innerHTML = html;
        if (window.MathJax) MathJax.typesetPromise();
    };

    window.confirmAndSave = async () => {
        overlay.style.display = 'flex';
        document.getElementById('confirm-btn').disabled = true;
        try {
            await addDoc(collection(db, "submissions"), {
                name: userName, mobile: userMobile, testCode: activeCode,
                answers: userAnswers, timestamp: new Date()
            });
            alert("சமர்ப்பிக்கப்பட்டது!");
            location.reload();
        } catch (e) {
            alert("Error: " + e.message);
            overlay.style.display = 'none';
        }
    };

    window.backToEdit = () => {
        document.getElementById('preview-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
    };
</script>
</body>
</html>
